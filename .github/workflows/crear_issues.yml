name: Crear Issues OWASP

on:
  workflow_dispatch:

jobs:
  crear-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Crear labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: "planning",      color: "0075ca", description: "Planificacion del proyecto" },
              { name: "backend",       color: "e4e669", description: "Desarrollo backend" },
              { name: "frontend",      color: "d876e3", description: "Desarrollo frontend" },
              { name: "testing",       color: "0e8a16", description: "Pruebas" },
              { name: "bug",           color: "d73a4a", description: "Bugs encontrados" },
              { name: "documentation", color: "0052cc", description: "Documentacion" },
              { name: "deployment",    color: "f9d0c4", description: "Despliegue" },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...label });
                console.log(`Label creado: ${label.name}`);
              } catch (e) { console.log(`Label ya existe: ${label.name}`); }
            }

      - name: Crear milestones
        uses: actions/github-script@v7
        with:
          script: |
            const milestones = ["Semana 1 - Planificacion","Semana 2 - Desarrollo","Semana 3 - Frontend","Semana 4 - Pruebas","Semana 5 - Cierre"];
            for (const title of milestones) {
              try {
                await github.rest.issues.createMilestone({ owner: context.repo.owner, repo: context.repo.repo, title });
                console.log(`Milestone creado: ${title}`);
              } catch (e) { console.log(`Milestone ya existe: ${title}`); }
            }

      - name: Obtener IDs de milestones
        id: milestones
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.issues.listMilestones({ owner: context.repo.owner, repo: context.repo.repo, state: "open" });
            const map = {};
            for (const m of data) map[m.title] = m.number;
            return map;

      - name: Crear issues
        uses: actions/github-script@v7
        with:
          script: |
            const milestones = JSON.parse(`${{ steps.milestones.outputs.result }}`);
            const issues = [
              { title: "Definir requerimientos del sistema",                labels: ["planning"],                   milestone: "Semana 1 - Planificacion" },
              { title: "Disenar arquitectura del verificador OWASP",        labels: ["planning"],                   milestone: "Semana 1 - Planificacion" },
              { title: "Configurar repositorio y estructura del proyecto",  labels: ["documentation"],              milestone: "Semana 2 - Desarrollo" },
              { title: "Implementar verificaciones OWASP Top 10 (A01-A05)", labels: ["backend"],                   milestone: "Semana 2 - Desarrollo" },
              { title: "Implementar verificaciones OWASP Top 10 (A06-A10)", labels: ["backend"],                   milestone: "Semana 2 - Desarrollo" },
              { title: "Exponer API REST para analizar codigo",              labels: ["backend"],                   milestone: "Semana 2 - Desarrollo" },
              { title: "Crear interfaz para subir codigo o URL",             labels: ["frontend"],                  milestone: "Semana 3 - Frontend" },
              { title: "Mostrar resultados del analisis en dashboard",       labels: ["frontend"],                  milestone: "Semana 3 - Frontend" },
              { title: "Integrar frontend con backend",                      labels: ["frontend"],                  milestone: "Semana 3 - Frontend" },
              { title: "Realizar pruebas unitarias e integracion",           labels: ["testing"],                   milestone: "Semana 4 - Pruebas" },
              { title: "Registrar y corregir bugs",                          labels: ["bug"],                       milestone: "Semana 4 - Pruebas" },
              { title: "Documentacion final y despliegue",                   labels: ["documentation","deployment"], milestone: "Semana 5 - Cierre" },
            ];
            for (const issue of issues) {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: issue.title, labels: issue.labels, milestone: milestones[issue.milestone] });
              console.log(`Issue creado: ${issue.title}`);
            }
