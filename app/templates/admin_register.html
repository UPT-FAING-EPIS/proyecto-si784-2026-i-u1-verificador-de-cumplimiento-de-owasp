{% extends 'base.html' %}
{% block content %}
<section class="hero">
    <div>
        <p class="eyebrow">Área de Acceso</p>
        <h2>Registro de Usuario</h2>
        <p style="margin-top: 12px; opacity: 0.95; font-size: 1rem;">Crea tu cuenta personal para acceder al panel de análisis.</p>
    </div>
    <a class="button button-secondary" href="/login">Volver al Login</a>
</section>

<section class="card" style="max-width: 560px; margin: 0 auto 40px auto; padding: 32px;">
    {% if error %}
    <div style="margin-bottom: 20px; padding: 12px 14px; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.4); background: rgba(239, 68, 68, 0.12); color: #fca5a5; font-weight: 600; font-size: 0.9rem;">
        ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/register" style="display: flex; flex-direction: column; gap: 20px;">
        <div>
            <label for="username" style="font-weight: 600; display: block; margin-bottom: 6px;">Nombre de Usuario</label>
            <input id="username" type="text" name="username" placeholder="Ingresa tu nombre de usuario" required style="width: 100%;">
        </div>
        
        <div>
            <label for="email" style="font-weight: 600; display: block; margin-bottom: 6px;">Correo Electrónico</label>
            <input id="email" type="email" name="email" placeholder="tu-correo@ejemplo.com" required style="width: 100%;">
        </div>
        
        <div>
            <label for="password" style="font-weight: 600; display: block; margin-bottom: 6px;">Contraseña</label>
            <input id="password" type="password" name="password" placeholder="Ingresa una contraseña segura" required style="width: 100%;">
        </div>

        <button class="button" type="submit" style="margin-top: 10px; padding: 12px;">Registrarse</button>
    </form>

    <p style="margin-top: 24px; text-align: center; font-size: 0.875rem; color: var(--muted);">
        ¿Ya tienes una cuenta? <a href="/login" style="color: var(--accent-2); font-weight: 600; text-decoration: none;">Inicia sesión aquí</a>
    </p>
</section>
{% endblock %}
