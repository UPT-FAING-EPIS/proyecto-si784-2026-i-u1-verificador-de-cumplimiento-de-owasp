<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title if title else 'OWASP Verificator' }}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="topbar-left">
                <h1>🔒 OWASP Verificator</h1>
                <nav class="topbar-nav">
                    <a href="/">Dashboard</a>
                    <a href="/analyze">Analizar</a>
                    <a href="/reports/compare">Comparar</a>
                    <a href="/owasp">Wiki OWASP</a>
                    <a href="/monitoring">Monitoreo</a>
                    <a href="/about">Acerca de</a>
                </nav>
            </div>
            <div class="topbar-actions">
                <a class="topbar-action topbar-action-docs" href="/docs" title="API Docs">
                    📘 API
                </a>
                <a class="topbar-action topbar-action-admin" href="/admin/login" title="Admin Seguro">
                    🛡️ Admin
                </a>
            </div>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
